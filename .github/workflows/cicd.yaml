name: Build and Deploy WAR to Apache Tomcat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build WAR package
        run: mvn clean package -DskipTests

      - name: Verify WAR file location
        run: |
          echo "Listing WAR files:"
          find . -name "*.war"

      - name: Upload WAR file via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.TOMCAT_HOST }}
          username: ${{ secrets.TOMCAT_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "target/*.war"
          target: "/tmp/"

      - name: Deploy WAR to Tomcat
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.TOMCAT_HOST }}
          username: ${{ secrets.TOMCAT_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            echo "Copying WAR file to Tomcat webapps..."

            cp /tmp/target/*.war /opt/apache-tomcat-9.0.118/webapps/

            echo "Waiting for Tomcat to extract WAR..."
            sleep 10

            echo "Verifying deployment..."
            ls -la /opt/apache-tomcat-9.0.118/webapps/

            echo "Deployment completed successfully!"
